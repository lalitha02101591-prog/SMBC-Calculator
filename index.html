<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMBC Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>SMBC Calculator</h1>
            <p class="subtitle">
                Personal SMBC Calculation Tool
            </p>
        </header>

        <main>

            <!-- Dynamic Input Sections -->
            <div id="inputArea"></div>

            <!-- Buttons -->
            <div class="buttonArea">
    <button id="calculateBtn">
        Calculate SMBC
    </button>

    <button id="clearBtn">
        Clear
    </button>

    <button id="pdfBtn">
        Download PDF
    </button>
</div>

            <!-- Results -->
            <div id="resultArea"></div>

        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
